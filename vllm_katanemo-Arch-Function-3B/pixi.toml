[project]
name = "arch-function-3b-local"
version = "0.1.0"
description = "Local vLLM + Streamlit UI for Arch-Function-3B"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
pip = "*"

[tasks]
install = "python -m pip install -r requirements-app.txt"
api = { cmd = "python quant_arch_function_3b.py", depends_on = ["install"] }
all = { cmd = "python quant_arch_function_3b.py", depends_on = ["install"] }
